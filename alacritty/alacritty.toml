[font]
normal = { family = "SFMono Nerd Font", style = "Regular" }
bold = { family = "SFMono Nerd Font", style = "Medium" }
italic = { family = "SFMono Nerd Font", style = "Regular Italic" }
bold_italic = { family = "SFMono Nerd Font", style = "Medium Italic" }
size = 12
offset = { x = 1, y = 0 }
[window]
padding = { x = 6, y = 6 }
# github Alacritty Colors

# Default colors
[colors.primary]
background = '#0d1117'
foreground = '#f0f6fc'

# Normal colors
[colors.normal]
black   = '#2f3742'
red     = '#ff7b72'
green   = '#3fb950'
yellow  = '#d29922'
blue    = '#58a6ff'
magenta = '#be8fff'
cyan    = '#39c5cf'
white   = '#f0f6fc'

# Bright colors
[colors.bright]
black   = '#656c76'
red     = '#ffa198'
green   = '#56d364'
yellow  = '#e3b341'
blue    = '#79c0ff'
magenta = '#d2a8ff'
cyan    = '#56d4dd'
white   = '#ffffff'

[[colors.indexed_colors]]
index = 16
color = '#d18616'

[[colors.indexed_colors]]
index = 17
color = '#ffa198'

